<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧋 wxh的记录册</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        boba: ['"ZCOOL KuaiLe"', '"PingFang SC"', 'cursive'],
        ma: ['"Ma Shan Zheng"', 'cursive'],
      },
      colors: {
        accent: {
          50: '#fef6f0',
          100: '#fde8db',
          200: '#f9c9a5',
          300: '#f5aa6f',
          400: '#f09a5a',
          500: '#C86A4B',
          600: '#A0523A',
          700: '#8A4530',
          800: '#6E3726',
          900: '#52291C',
        }
      },
      borderRadius: {
        '2xl': '1rem',
        '3xl': '1.5rem',
      },
      boxShadow: {
        'card': '0 8px 32px rgba(200,106,75,0.06)',
        'card-hover': '0 12px 40px rgba(200,106,75,0.12)',
        'btn': '0 4px 14px rgba(200,106,75,0.28)',
        'btn-hover': '0 6px 20px rgba(200,106,75,0.38)',
      }
    }
  }
}
</script>
<style>
  /* ============================================================
     Animations
     ============================================================ */
  @keyframes breathe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes boba-bounce { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} 60%{transform:translateY(1px)} }
  @keyframes sip { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
  @keyframes blush-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.55} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes modalIn { from{transform:translateY(30px) scale(0.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
  /* Memo character animations */
  @keyframes pen-write { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(8deg)} }
  @keyframes paper-flip { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(-4deg)} 70%{transform:rotate(3deg)} }

  .animate-breathe { animation: breathe 3s ease-in-out infinite; }
  .animate-boba-bounce { animation: boba-bounce 0.75s ease-in-out infinite; }
  .animate-sip { animation: sip 0.75s ease-in-out infinite; }
  .animate-blush-pulse { animation: blush-pulse 3s ease-in-out infinite; }
  .animate-float { animation: float 3s ease-in-out infinite; }
  .animate-fade-in { animation: fadeIn 0.2s ease-out; }
  .animate-modal-in { animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .animate-pen-write { animation: pen-write 1.5s ease-in-out infinite; transform-origin: 50% 70%; }
  .animate-paper-flip { animation: paper-flip 4s ease-in-out infinite; transform-origin: 100% 0%; }

  /* Star styling */
  .star-filled { fill: #C86A4B; color: #C86A4B; }
  .star-empty { fill: none; color: #d1d5db; }

  /* Custom thin scrollbar */
  .thin-scroll::-webkit-scrollbar { width: 5px; }
  .thin-scroll::-webkit-scrollbar-track { background: transparent; }
  .thin-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }
  .thin-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.14); }

  /* Toast transition */
  .toast-in { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  .toast-out { opacity: 0; transform: translateX(-50%) translateY(0); }

  /* Body background transition */
  body { transition: background 0.6s ease; }

  /* Focus ring override */
  *:focus-visible { outline: 2px solid #C86A4B; outline-offset: 2px; }

  /* Glass card base — subtle floating effect */
  .glass-card {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 8px 32px rgba(200,106,75,0.06);
  }

  /* ============================================================
     Paper Textures for Journal Cards
     ============================================================ */
  .paper-grid {
    background-color: #FFFDFA;
    background-image: linear-gradient(#EDE4DB 1px, transparent 1px), linear-gradient(90deg, #EDE4DB 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: -1px -1px;
  }
  .paper-lined {
    background-color: #FFFDFA;
    background-image: repeating-linear-gradient(transparent, transparent 29px, #EDE4DB 29px, #EDE4DB 30px);
  }
  .paper-dot {
    background-color: #FFFDFA;
    background-image: radial-gradient(#D4CEC7 1.2px, transparent 1.2px);
    background-size: 20px 20px;
    background-position: -2px -2px;
  }
  .paper-blank {
    background-color: #faf8f5;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(200,106,75,0.04) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 50%, rgba(200,106,75,0.03) 0%, transparent 50%);
    box-shadow: inset 0 0 60px rgba(200,106,75,0.05);
  }
</style>
</head>
<body class="min-h-screen font-boba text-gray-800 antialiased leading-relaxed"
      style="background: linear-gradient(160deg, #FDF6F0 0%, #FEF9F4 30%, #FDF3F0 60%, #FFF8F4 100%); background-attachment: fixed;">

<!-- ============================================================
     Top Navigation Bar
     ============================================================ -->
<header class="sticky top-0 z-30 bg-white/60 backdrop-blur-xl border-b border-white/50 shadow-sm">
  <div class="w-full px-6 sm:px-10 py-3 flex items-center gap-3">
    <!-- Cute Boy SVG -->
    <svg class="w-10 h-10 flex-shrink-0" viewBox="0 0 100 100" fill="none">
      <g class="animate-boba-bounce" style="transform-origin:center center;">
        <!-- Hair (messy/curly) -->
        <ellipse cx="50" cy="30" rx="30" ry="24" fill="#5C3D2E"/>
        <ellipse cx="50" cy="26" rx="26" ry="20" fill="#6B4533"/>
        <!-- Hair tufts -->
        <path d="M24 26 Q20 14 28 12 Q24 20 28 26" fill="#5C3D2E"/>
        <path d="M42 18 Q38 6 46 4 Q42 14 46 20" fill="#6B4533"/>
        <path d="M58 18 Q56 5 62 3 Q60 15 62 20" fill="#5C3D2E"/>
        <path d="M76 26 Q82 12 74 10 Q78 20 73 26" fill="#6B4533"/>
        <!-- Face -->
        <ellipse cx="50" cy="46" rx="25" ry="23" fill="#FCE4D6"/>
        <!-- Blush -->
        <ellipse cx="34" cy="50" rx="6" ry="3.5" fill="#F2B8A0" opacity="0.5" class="animate-blush-pulse"/>
        <ellipse cx="66" cy="50" rx="6" ry="3.5" fill="#F2B8A0" opacity="0.5" class="animate-blush-pulse"/>
        <!-- Eyes (happy curved) -->
        <path d="M36 43 Q40 38 44 43" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M56 43 Q60 38 64 43" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Eye shine -->
        <circle cx="41" cy="41" r="1.8" fill="white" opacity="0.8"/>
        <circle cx="61" cy="41" r="1.8" fill="white" opacity="0.8"/>
        <!-- Mouth (smile) -->
        <path d="M43 54 Q50 61 57 54" fill="none" stroke="#D4896A" stroke-width="2" stroke-linecap="round"/>
        <!-- Body/torso -->
        <rect x="36" y="67" width="28" height="22" rx="10" fill="#4A90D9" stroke="#3A7BC8" stroke-width="2"/>
        <!-- Collar -->
        <path d="M40 67 L50 75 L60 67" fill="none" stroke="#3A7BC8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>
    <h1 class="text-xl sm:text-2xl font-boba font-bold text-gray-800 tracking-wide whitespace-nowrap">wxh的记录册</h1>
    <!-- Background Theme Switcher — 5 pastel dots -->
    <div class="flex items-center gap-1.5 ml-2 sm:ml-4" id="bg-theme-switcher">
      <button class="bg-dot w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 cursor-pointer hover:scale-125 active:scale-90 transition-all duration-200" data-bg="warm" title="暖橘" style="background:linear-gradient(135deg,#FDE8DB,#F5C9A5);border-color:#C86A4B;box-shadow:0 0 0 3px rgba(200,106,75,0.15)"></button>
      <button class="bg-dot w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 cursor-pointer hover:scale-125 active:scale-90 transition-all duration-200" data-bg="mint" title="薄荷" style="background:linear-gradient(135deg,#D4EDDA,#A8DFC8);border-color:transparent"></button>
      <button class="bg-dot w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 cursor-pointer hover:scale-125 active:scale-90 transition-all duration-200" data-bg="lavender" title="薰衣草" style="background:linear-gradient(135deg,#E8DCF0,#D4C4E8);border-color:transparent"></button>
      <button class="bg-dot w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 cursor-pointer hover:scale-125 active:scale-90 transition-all duration-200" data-bg="sky" title="天空" style="background:linear-gradient(135deg,#D6ECFB,#B8DCF8);border-color:transparent"></button>
      <button class="bg-dot w-5 h-5 sm:w-6 sm:h-6 rounded-full border-2 cursor-pointer hover:scale-125 active:scale-90 transition-all duration-200" data-bg="rose" title="玫瑰" style="background:linear-gradient(135deg,#FCE4EC,#F8D0D8);border-color:transparent"></button>
    </div>
    <!-- Tab Switcher — text only -->
    <nav class="ml-auto flex items-center gap-4">
      <button data-tab="tracker" class="tab-btn text-sm font-bold transition-all duration-200 cursor-pointer border-none bg-transparent px-1 py-1 border-b-2 rounded-none tracking-wide" style="color:#C86A4B;border-color:#C86A4B;" onclick="switchTab('tracker')">奶茶记录</button>
      <button data-tab="journal" class="tab-btn text-sm font-bold transition-all duration-200 cursor-pointer border-none bg-transparent px-1 py-1 border-b-2 rounded-none tracking-wide" style="color:#B5A59A;border-color:transparent;" onclick="switchTab('journal')">随想记录</button>
    </nav>
  </div>
</header>

<!-- ============================================================
     Main Content Area
     ============================================================ -->
<main id="app" class="w-full px-4 sm:px-6 py-4">
  <div id="panel-zone" class="space-y-4">

    <!-- ============================================================
         PAGE: 奶茶记录 (Tracker)
         ============================================================ -->
    <div id="page-tracker" class="page space-y-3">

      <!-- Header (无框, 与随想页一致) -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-lg sm:text-xl font-bold text-gray-800 flex items-center gap-2">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" viewBox="0 0 24 24" fill="none">
              <g class="animate-boba-bounce" style="transform-origin:center center;">
                <path d="M5 8 L6 20 C6 21 7 22 8 22 L16 22 C17 22 18 21 18 20 L19 8 Z" fill="#FFF8F0" stroke="#C86A4B" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M4 8 Q12 4 20 8" fill="#FFFDF8" stroke="#C86A4B" stroke-width="1.6"/>
                <ellipse cx="12" cy="8" rx="8" ry="1.6" fill="#FFFDF8" stroke="#C86A4B" stroke-width="1.6"/>
                <line x1="15" y1="2" x2="15" y2="16" stroke="#C86A4B" stroke-width="2.2" stroke-linecap="round"/>
                <circle cx="9" cy="14" r="1.3" fill="#3D2B1F" opacity="0.75"/>
                <circle cx="13" cy="15.5" r="1.3" fill="#3D2B1F" opacity="0.75"/>
                <circle cx="15.5" cy="13" r="1.1" fill="#3D2B1F" opacity="0.65"/>
                <circle cx="11" cy="17" r="1.2" fill="#3D2B1F" opacity="0.7"/>
              </g>
            </svg>
            奶茶记录册
          </h2>
          <p class="text-[10px] text-gray-400 mt-0">记录每一杯的小确幸</p>
        </div>
        <button class="px-4 py-2 rounded-2xl bg-[#C86A4B] text-white text-xs sm:text-sm font-bold shadow-[0_4px_14px_rgba(200,106,75,0.28)] hover:bg-[#A0523A] hover:shadow-[0_6px_20px_rgba(200,106,75,0.38)] active:scale-95 transition-all duration-200" onclick="openModal()">+ 记录奶茶</button>
      </div>

      <!-- ============================================================
           ① 搜索工具区 (Search) — 最轻量
           ============================================================ -->
      <div class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-2.5 sm:p-3">
        <div class="flex items-center border border-white/40 rounded-full overflow-hidden bg-white/50 focus-within:border-[#C86A4B] focus-within:ring-4 focus-within:ring-[rgba(200,106,75,0.1)] transition-all duration-200">
          <input class="flex-1 border-none bg-transparent text-sm text-gray-800 py-2 pl-4 pr-1 font-boba outline-none placeholder:text-gray-400" id="search-input" placeholder="搜索奶茶..." onfocus="openFilter()" oninput="doSearch()">
          <button class="w-7 h-7 rounded-full border-none bg-gray-200/60 text-gray-400 cursor-pointer hidden items-center justify-center text-xs hover:bg-gray-300/60 transition-all duration-200 font-boba" id="search-clear" onclick="clearSearch()">✕</button>
          <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 text-gray-400 cursor-pointer hover:text-[#C86A4B] transition-colors duration-200" onclick="doSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="w-4 h-4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
        </div>
        <div class="mt-1.5 hidden flex-wrap gap-2 p-1.5 bg-white/40 rounded-xl text-xs" id="filter-panel">
          <div class="flex-1 min-w-[60px]">
            <label class="block text-[10px] font-semibold text-gray-400 mb-0.5">品牌</label>
            <input class="w-full px-2 py-1 rounded-lg border border-white/40 text-xs text-gray-800 bg-white/60 font-boba focus:border-[#C86A4B] outline-none" placeholder="品牌..." oninput="doSearch()" id="filter-brand">
          </div>
          <div class="flex-1 min-w-[60px]">
            <label class="block text-[10px] font-semibold text-gray-400 mb-0.5">开始</label>
            <input class="w-full px-2 py-1 rounded-lg border border-white/40 text-xs text-gray-800 bg-white/60 font-boba focus:border-[#C86A4B] outline-none" type="date" onchange="doSearch()" id="filter-from">
          </div>
          <div class="flex-1 min-w-[60px]">
            <label class="block text-[10px] font-semibold text-gray-400 mb-0.5">结束</label>
            <input class="w-full px-2 py-1 rounded-lg border border-white/40 text-xs text-gray-800 bg-white/60 font-boba focus:border-[#C86A4B] outline-none" type="date" onchange="doSearch()" id="filter-to">
          </div>
          <button class="text-[10px] px-2 py-1 border-none bg-transparent text-gray-400 cursor-pointer font-boba hover:text-gray-600" onclick="clearFilters()">清除</button>
        </div>
      </div>

      <!-- ============================================================
           ② 统计数据区 (Analytics) — 次之, 80%高度, 去SVG
           ============================================================ -->
      <div id="stats-bar" class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-2">
        <div class="flex items-center justify-between mb-0.5">
          <span class="text-[10px] font-bold text-gray-800 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" id="stats-chart">
              <style>#stats-chart rect{transition:y 0.4s ease,height 0.4s ease}</style>
              <rect x="1" y="14" width="3.5" height="3" rx="0.7" fill="#E8B8A2" id="chart-bar1"/>
              <rect x="7" y="11" width="3.5" height="6" rx="0.7" fill="#C86A4B" id="chart-bar2"/>
              <rect x="13" y="8" width="3.5" height="8" rx="0.7" fill="#A0523A" id="chart-bar3"/>
            </svg>
            本月统计
          </span>
          <button onclick="goToday()" class="px-3 py-0.5 rounded-full bg-[#C86A4B] text-white text-xs font-bold shadow-[0_4px_14px_rgba(200,106,75,0.28)] hover:bg-[#A0523A] hover:shadow-[0_6px_20px_rgba(200,106,75,0.38)] active:scale-95 transition-all duration-200">
            今天
          </button>
        </div>
        <div class="grid grid-cols-3 gap-1.5">
          <div class="text-center p-1">
            <div class="text-lg sm:text-xl font-bold text-[#C86A4B] leading-tight" id="month-total">0</div>
            <div class="text-[10px] text-gray-400 mt-0">杯数</div>
          </div>
          <div class="text-center p-1">
            <div class="text-lg sm:text-xl font-bold text-[#C86A4B] leading-tight" id="week-avg">0</div>
            <div class="text-[10px] text-gray-400 mt-0">周均</div>
          </div>
          <div class="text-center p-1">
            <div class="text-lg sm:text-xl font-bold text-[#C86A4B] leading-tight" id="total-spend">¥0</div>
            <div class="text-[10px] text-gray-400 mt-0">消费</div>
          </div>
        </div>
      </div>

      <!-- ============================================================
           ③ 记录核心区 (Recording) — 最大
           左列: 日历 + 我的最爱 | 右列: 语录 + 今日奶茶 + 昨日
           ============================================================ -->
      <div id="content-grid" class="grid grid-cols-1 lg:grid-cols-12 gap-3">

        <!-- LEFT COLUMN: 日历 + 我的最爱 -->
        <div id="left-col" class="lg:col-span-8 space-y-3">

          <!-- 日历 -->
          <div class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-2.5 sm:p-3">
            <div class="calendar" id="calendar"></div>
          </div>

          <!-- 我的最爱 -->
          <div class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-3 sm:p-4 flex flex-col" style="min-height:100px">
            <div class="flex items-center gap-2 font-bold text-gray-800 text-xs mb-1.5">📌 我的最爱</div>
            <div id="pinned-list" class="flex-1"></div>
            <div id="pinned-empty" class="flex-1 flex flex-col items-center justify-center text-center py-1">
              <svg width="36" height="36" viewBox="0 0 100 100" fill="none" stroke="#C86A4B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.2">
                <ellipse cx="50" cy="55" rx="24" ry="3.5"/>
                <path d="M32 32 L35 66 C35 69 37 71 40 71 L60 71 C63 71 65 69 65 66 L68 32 Z"/>
                <path d="M28 32 Q50 18 72 32"/>
                <ellipse cx="50" cy="32" rx="22" ry="4.5"/>
                <rect x="24" y="18" width="52" height="13" rx="6.5"/>
                <circle cx="34" cy="24.5" r="1.8"/>
                <circle cx="50" cy="24.5" r="1.8"/>
                <circle cx="66" cy="24.5" r="1.8"/>
              </svg>
              <p class="text-xs text-gray-400 mt-1">快去标记最爱 🧋</p>
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN: 语录 + 今日奶茶 + 昨日 (填满) -->
        <div id="right-col" class="lg:col-span-4 flex flex-col gap-3">

          <!-- 每日奶茶语录 (缩短) -->
          <div class="bg-white/20 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-2 text-center cursor-pointer hover:shadow-[0_12px_36px_rgba(200,106,75,0.1)] transition-all duration-300 relative overflow-hidden flex items-center justify-center gap-2 flex-shrink-0"
               id="quote-w" onclick="nextQuote()" style="min-height:38px;background:linear-gradient(135deg,rgba(254,246,240,0.6),rgba(253,242,248,0.5),rgba(254,249,240,0.5))">
            <span class="text-lg animate-float flex-shrink-0" id="quote-emoji">💫</span>
            <div class="text-xs sm:text-sm text-gray-800 font-boba font-medium relative z-10" id="quote-text">生活苦短，全糖加满</div>
            <div class="text-[10px] text-gray-400 font-boba flex-shrink-0" id="quote-author">— 每日奶茶语录</div>
          </div>

          <!-- 今日奶茶 (撑开) -->
          <div class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-3 sm:p-4 flex flex-col flex-1 min-h-0">
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-sm sm:text-base font-bold text-gray-800 flex-shrink-0" id="entry-date-label">今日奶茶</h2>
              <span class="text-xs text-gray-400 bg-white/60 px-2 py-0.5 rounded-full font-medium flex-shrink-0" id="entry-count">0 杯</span>
            </div>
            <div id="entries-container" data-empty="true" class="flex-1 flex flex-col overflow-y-auto thin-scroll min-h-0">
              <div class="flex flex-col items-center text-center py-4 flex-1 justify-center">
                <div class="text-4xl mb-2 animate-float">🧋</div>
                <div class="text-base font-bold text-gray-800 mb-1">今日暂无记录</div>
                <div class="text-xs sm:text-sm text-gray-400">点击上方按钮记录今天的第一杯奶茶吧</div>
              </div>
            </div>
          </div>

          <!-- 昨日好心情 (撑开) -->
          <div class="bg-white/40 backdrop-blur-xl rounded-[24px] shadow-[0_8px_32px_rgba(200,106,75,0.06)] border border-white/60 p-3 sm:p-4 flex flex-col flex-1 min-h-0" style="background:linear-gradient(135deg,rgba(254,246,240,0.7),rgba(253,242,248,0.6),rgba(254,249,240,0.6))">
            <div class="flex items-center justify-between mb-2 flex-shrink-0">
              <h2 class="text-sm sm:text-base font-bold text-gray-800">🥤 昨日好心情</h2>
              <span class="text-xs text-gray-400 bg-white/60 px-2 py-0.5 rounded-full font-medium" id="yesterday-count">0 杯</span>
            </div>
            <div id="yesterday-container" data-empty="true" class="overflow-y-auto thin-scroll min-h-0 flex-1"

  document.body.style.backgroundAttachment = 'fixed';
  // Update dot borders
  document.querySelectorAll('#bg-theme-switcher .bg-dot').forEach(d => {
    d.style.borderColor = 'transparent';
    d.style.boxShadow = 'none';
  });

  localStorage.setItem('bg_theme', theme);

const DB = 'milktea_v10';
function ld() { try { return JSON.parse(localStorage.getItem(DB) || '[]'); } catch (e) { return []; } }
function sv(a) { localStorage.setItem(DB, JSON.stringify(a)); }
let entries = ld(),
  selDate = new Date().toISOString().split('T')[0],
  calY = new Date().getFullYear(),

  editId = null,

/* ============================================================
   Image Upload
   ============================================================ */
const upZ = document.getElementById('upload-zone'),
  upI = document.getElementById('upload-input'),
  tL = document.getElementById('thumb-preview-list');
upZ.addEventListener('dragover', e => { e.preventDefault(); upZ.classList.add('border-accent-500', 'bg-accent-50'); });
upZ.addEventListener('dragleave', () => { upZ.classList.remove('border-accent-500', 'bg-accent-50'); });
upZ.addEventListener('drop', e => { e.preventDefault(); upZ.classList.remove('border-accent-500', 'bg-accent-50'); handleFiles(e.dataTransfer.files); });
function handleFiles(files) {
  if (!files || !files.length) return;
  const ok = ['image/jpeg', 'image/png', 'image/webp'];
  for (const f of files) {
    if (pendingImgs.length >= 9) { toast('最多9张', 'warn'); break; }
    if (!ok.includes(f.type)) { toast('不支持 ' + f.type, 'warn'); continue; }
    if (f.size > 5 * 1024 * 1024) { toast('单图≤5MB', 'warn'); continue; }
    const r = new FileReader();
    r.onload = e => { pendingImgs.push({ dataUrl: e.target.result }); renderThumbs(); };
    r.readAsDataURL(f);
  }
  upI.value = '';
}
function renderThumbs() {
  tL.innerHTML = pendingImgs.map((x, i) =>
    `<div class="relative w-[62px] h-[62px] rounded-lg overflow-hidden border border-gray-200"><img src="${x.dataUrl}" class="w-full h-full object-cover"><button class="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red-400 border-none text-white text-[10px] cursor-pointer flex items-center justify-center" onclick="removeImg(${i})">✕</button></div>`
  ).join('');
}
function removeImg(i) { pendingImgs.splice(i, 1); renderThumbs(); }

   Modal — Milk Tea

}

function editEntry(id) {

function saveEntry() {

/* ============================================================
   Render — Milk Tea

function renderAll() { renderCal(); renderEntries(); renderYesterday(); renderPinned(); renderStats(); }

function renderStats() {
  const now = new Date(), m = now.getMonth(), y = now.getFullYear();
  const me = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });
  document.getElementById('month-total').textContent = me.length;
  const dim = new Date(y, m + 1, 0).getDate();
  const wa = Math.round(me.length / Math.ceil(dim / 7) || 0);
  document.getElementById('week-avg').textContent = wa;
  document.getElementById('total-spend').textContent = '¥' + (me.length * 18);
  // 动态更新柱状图
  const h1 = Math.max(2, Math.min(12, Math.round(me.length / 30 * 12) || 2));
  const h2 = Math.max(2, Math.min(12, Math.round(wa / 7 * 12) || 2));
  const h3 = Math.max(2, Math.min(12, Math.round(me.length * 18 / 540 * 12) || 2));
  const setBar = (id, h) => { const r = document.getElementById(id); if (r) { r.setAttribute('y', 14 - h); r.setAttribute('height', h); } };
  setBar('chart-bar1', h1);
  setBar('chart-bar2', h2);
  setBar('chart-bar3', h3);
}

function renderCal() {
  const c = document.getElementById('calendar'),
    today = new Date().toISOString().split('T')[0],
    fd = new Date(calY, calM, 1),
    ld2 = new Date(calY, calM + 1, 0),
    off = (fd.getDay() + 6) % 7,
    tot = ld2.getDate();
  const byD = {};
  entries.forEach(e => { if (!byD[e.date]) byD[e.date] = []; byD[e.date].push(e); });

  let h = `<div class="flex items-center justify-between mb-1.5 pb-1.5 border-b border-gray-100">
    <h2 class="text-base sm:text-lg font-bold text-gray-800">${calY}年 ${calM + 1}月</h2>
    <div class="flex items-center gap-2">
      <button class="px-3 py-1 rounded-full bg-accent-500 text-white text-xs font-bold shadow-btn hover:bg-accent-600 active:scale-95 transition-all duration-200" onclick="goToday()">今天</button>
      <button class="w-7 h-7 rounded-full border border-gray-200 bg-white text-gray-400 cursor-pointer text-sm flex items-center justify-center hover:bg-accent-50 hover:text-accent-500 hover:border-accent-500 active:scale-90 transition-all duration-200" onclick="chM(-1)">‹</button>
      <button class="w-7 h-7 rounded-full border border-gray-200 bg-white text-gray-400 cursor-pointer text-sm flex items-center justify-center hover:bg-accent-50 hover:text-accent-500 hover:border-accent-500 active:scale-90 transition-all duration-200" onclick="chM(1)">›</button>
    </div>
  </div>`;

  h += `<div class="grid grid-cols-7 mb-1">${['一', '二', '三', '四', '五', '六', '日'].map(d => `<div class="text-center text-xs font-semibold text-gray-400 py-1">${d}</div>`).join('')}</div>`;
  h += `<div class="grid grid-cols-7 gap-0.5">`;

  for (let i = 0; i < off; i++) h += `<div class="h-11 flex flex-col items-center justify-center rounded-xl text-gray-300 opacity-20"></div>`;

  for (let d = 1; d <= tot; d++) {
    const ds = `${calY}-${String(calM + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`,
      de = byD[ds];
    let cls = 'h-11 flex flex-col items-center justify-center rounded-xl border-2 cursor-pointer transition-all duration-200 font-medium relative';
    if (ds === selDate) cls += ' border-accent-500 bg-accent-50 text-accent-700 shadow-[0_4px_16px_rgba(200,106,75,0.18)]';
    else cls += ' border-transparent text-gray-700 hover:bg-accent-50 hover:border-accent-300';
    if (ds === today) cls += ' font-bold';
    if (ds !== selDate && dayDiff(ds) < 0) cls += ' opacity-25 pointer-events-none';

    const isToday = ds === today;
    const isSel = ds === selDate;

    h += `<div class="${cls}" onclick="selDay('${ds}')">`;
    h += `<span class="text-sm sm:text-base">${d}</span>`;
    if (isToday && !isSel) h += `<span class="absolute top-0.5 right-0.5 text-[9px] text-accent-500 font-bold">今</span>`;
    if (de && de.length) {
      h += DRINK_ICONS[pickIcon(de[0].name)].replace('<svg', '<svg class="w-4 h-4 mt-0.5"');
    }
    h += `</div>`;
  }
  h += `</div>`;
  c.innerHTML = h;
}

function dayDiff(ds) {
  const today = new Date().toISOString().split('T')[0];
  return new Date(ds) - new Date(today);
}

function renderEntries() {
  const fl = entries.filter(e => e.date === selDate).sort((a, b) => b.createdAt - a.createdAt),
    ct = document.getElementById('entries-container');

  document.getElementById('entry-date-label').textContent = `今日奶茶`;
  document.getElementById('entry-count').textContent = `${fl.length} 杯`;
  ct.querySelectorAll('.entry-card').forEach(el => el.remove());
  if (!fl.length) {
    ct.setAttribute('data-empty', 'true');
    ct.querySelector('.flex.flex-col.items-center').style.display = '';

    ct.setAttribute('data-empty', 'false');
    ct.querySelector('.flex.flex-col.items-center').style.display = 'none';

}

        <button class="flex items-center gap-1 px-2.5 py-1 rounded-lg border border-gray-200 text-xs font-medium cursor-pointer font-boba bg-white text-gray-400 hover:bg-white hover:text-gray-700 active:scale-95 transition-all duration-200" onclick="editEntry(${e.id})">编辑</button>
        <button class="flex items-center gap-1 px-2.5 py-1 rounded-lg border border-gray-200 text-xs font-medium cursor-pointer font-boba bg-white text-gray-400 hover:bg-red-50 hover:text-red-400 active:scale-95 transition-all duration-200" onclick="delEntry(${e.id})">删除</button>
        <span class="text-[10px] text-gray-400 bg-gray-100 px-2.5 py-0.5 rounded-full ml-auto">${fmtDate(e.date)}</span>
      </div>

}

/* ---- Calendar Nav ---- */
function selDay(d) { selDate = d; renderAll(); }
function goToday() {
  const n = new Date();
  selDate = n.toISOString().split('T')[0];
  calY = n.getFullYear();
  calM = n.getMonth();
  renderAll();
}
function chM(d) {
  calM += d;
  if (calM > 11) { calM = 0; calY++; }
  if (calM < 0) { calM = 11; calY--; }
  renderCal();
}

/* ---- Pin / Delete ---- */
function togPin(id) {
  const e = entries.find(x => x.id === id);
  if (e) { e.isPinned = !e.isPinned; e.updatedAt = Date.now(); sv(entries); renderAll(); toast(e.isPinned ? '已收藏' : '已取消收藏', 'info'); }
}
function delEntry(id) {
  if (!confirm('确定删除吗？')) return;
  entries = entries.filter(e => e.id !== id);
  sv(entries); renderAll(); toast('已删除', 'info');
}

/* ---- Search / Filter ---- */
function doSearch() {
  const t = document.getElementById('search-input').value.trim().toLowerCase(),
    b = document.getElementById('filter-brand').value.trim().toLowerCase(),
    f = document.getElementById('filter-from').value,
    to = document.getElementById('filter-to').value;
  document.getElementById('search-clear').classList.toggle('flex', !!(t || b || f || to));
  document.getElementById('search-clear').classList.toggle('hidden', !(t || b || f || to));
  if (!t && !b && !f && !to) { renderEntries(); return; }
  let fl = [...entries];
  if (t) fl = fl.filter(e => e.name.toLowerCase().includes(t) || (e.brand && e.brand.toLowerCase().includes(t)));
  if (b) fl = fl.filter(e => e.brand && e.brand.toLowerCase().includes(b));
  if (f) fl = fl.filter(e => e.date >= f);
  if (to) fl = fl.filter(e => e.date <= to);
  showResults(fl, t);
}
function showResults(r, term) {
  const ct = document.getElementById('entries-container');
  document.getElementById('entry-date-label').textContent = `搜索"${term || '全部'}"`;
  document.getElementById('entry-count').textContent = `${r.length} 条`;
  ct.querySelectorAll('.entry-card').forEach(el => el.remove());
  if (!r.length) {
    ct.setAttribute('data-empty', 'true');
    const es = ct.querySelector('.flex.flex-col.items-center');
    es.style.display = '';
    es.querySelector('.text-base.font-bold').textContent = '没有找到记录';
    es.querySelector('.text-xs').textContent = '试试其他关键词吧';
    const btn = es.querySelector('button');
    if (btn) btn.style.display = 'none';
  } else {
    ct.setAttribute('data-empty', 'false');
    ct.querySelector('.flex.flex-col.items-center').style.display = 'none';
    r.sort((a, b) => b.createdAt - a.createdAt).forEach(e => {
      const el = document.createElement('div');
      el.innerHTML = cardHTML(e);
      ct.appendChild(el.firstElementChild);
    });
  }
}
function clearSearch() {
  ['search-input', 'filter-brand', 'filter-from', 'filter-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('search-clear').classList.add('hidden');
  document.getElementById('search-clear').classList.remove('flex');
  renderAll();
}
function clearFilters() {
  ['filter-brand', 'filter-from', 'filter-to'].forEach(id => document.getElementById(id).value = '');
  doSearch();
}
function openFilter() {
  document.getElementById('filter-panel').classList.add('flex');
  document.getElementById('filter-panel').classList.remove('hidden');
}

/* ============================================================
   Helpers
   ============================================================ */
function fmtDate(d) { const [, m, dd] = d.split('-'); return `${+m}月${+dd}日`; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-7 py-3.5 rounded-full text-sm font-medium z-[300] pointer-events-none text-white shadow-lg backdrop-blur-md transition-all duration-300 font-boba toast-in';
  el.style.background = type === 'warn' ? 'rgba(200,106,75,0.92)' : 'rgba(55,65,81,0.9)';
  setTimeout(() => { el.classList.remove('toast-in'); el.classList.add('toast-out'); }, 2200);
}

/* ============================================================
   DATA LAYER — Journal
   ============================================================ */
const DB_JOURNAL = 'journal_v1';
function ldJournal() { try { return JSON.parse(localStorage.getItem(DB_JOURNAL) || '[]'); } catch (e) { return []; } }
function svJournal(a) { localStorage.setItem(DB_JOURNAL, JSON.stringify(a)); }

const MOODS = [
  { key: 'happy', emoji: '😊', label: '开心' },
  { key: 'sad', emoji: '😢', label: '难过' },
  { key: 'anxious', emoji: '😰', label: '焦虑' },
  { key: 'peaceful', emoji: '😌', label: '平静' },
  { key: 'excited', emoji: '🎉', label: '兴奋' },
  { key: 'grateful', emoji: '🙏', label: '感恩' },
  { key: 'inspired', emoji: '💡', label: '灵感' },
  { key: 'thoughtful', emoji: '🤔', label: '思考' },
];
const PAPERS = ['grid', 'lined', 'dot', 'blank'];
const PAPER_LABELS = { grid: '方格', lined: '横线', dot: '点阵', blank: '做旧' };

let journalEntries = ldJournal();
let journalEditId = null;
let journalMood = 'happy';
let journalCustomMood = '';
let journalPaper = 'grid';

/* ============================================================
   Modal — Journal
   ============================================================ */
function renderMoodSelector() {
  const presetHTML = MOODS.map(m =>
    `<button class="flex flex-col items-center gap-1 p-2 rounded-xl border-2 transition-all duration-200 cursor-pointer font-boba text-xs ${journalMood === m.key ? 'border-accent-500 bg-accent-50 text-accent-700' : 'border-gray-200 text-gray-400 hover:border-gray-300'}" onclick="selectJournalMood('${m.key}')">
      <span class="text-xl">${m.emoji}</span>
      <span>${m.label}</span>
    </button>`
  ).join('');

  const customBtn = `<button class="flex items-center justify-center p-2 rounded-xl border-2 transition-all duration-200 cursor-pointer font-boba text-xs ${journalMood === 'custom' ? 'border-accent-500 bg-accent-50 text-accent-700' : 'border-gray-200 text-gray-400 hover:border-gray-300'}" onclick="selectJournalMood('custom')">
    <span>自定义</span>
  </button>`;

  const customInput = journalMood === 'custom'
    ? `<div class="mt-2 col-span-4"><input class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-base text-gray-800 bg-white font-boba focus:border-accent-500 focus:ring-4 focus:ring-accent-100 outline-none transition-all duration-200" id="journal-modal-custom-mood" placeholder="输入你的心情..." value="${esc(journalCustomMood)}" oninput="journalCustomMood=this.value"></div>`
    : '';

  document.getElementById('journal-modal-moods').innerHTML = presetHTML + customBtn + customInput;
}

function selectJournalMood(key) {
  journalMood = key;
  if (key !== 'custom') journalCustomMood = '';
  renderMoodSelector();
}

function selectJournalPaper(paper, el) {
  journalPaper = paper;
  document.querySelectorAll('#journal-modal-papers .paper-option').forEach(o => {
    o.style.borderColor = '#EDE4DB';
    o.style.boxShadow = 'none';
  });
  el.style.borderColor = '#C86A4B';
  el.style.boxShadow = '0 0 0 3px rgba(200,106,75,0.12)';
}

function openJournalModal() {
  journalEditId = null;
  journalMood = 'happy';
  journalCustomMood = '';
  journalPaper = PAPERS[Math.floor(Math.random() * PAPERS.length)];
  document.getElementById('journal-modal-title').textContent = '写想法';
  document.getElementById('journal-modal-title-input').value = '';
  document.getElementById('journal-modal-content').value = '';
  document.getElementById('journal-modal-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('journal-modal-content').classList.remove('border-red-400', 'ring-4', 'ring-red-100');
  renderMoodSelector();
  // Reset paper options
  document.querySelectorAll('#journal-modal-papers .paper-option').forEach(o => {
    o.style.borderColor = '#EDE4DB';
    o.style.boxShadow = 'none';
  });
  const paperEl = document.querySelector(`#journal-modal-papers .paper-option[data-paper="${journalPaper}"]`);
  if (paperEl) { paperEl.style.borderColor = '#C86A4B'; paperEl.style.boxShadow = '0 0 0 3px rgba(200,106,75,0.12)'; }
  document.getElementById('journal-modal-overlay').classList.add('flex');
  document.getElementById('journal-modal-overlay').classList.remove('hidden');
}

function closeJournalModal() {
  document.getElementById('journal-modal-overlay').classList.add('hidden');
  document.getElementById('journal-modal-overlay').classList.remove('flex');
  journalEditId = null;
}

function editJournalEntry(id) {
  const e = journalEntries.find(x => x.id === id);
  if (!e) return;
  journalEditId = id;
  journalMood = e.mood || 'happy';
  journalCustomMood = e.customMood || '';
  journalPaper = e.paper || 'grid';
  document.getElementById('journal-modal-title').textContent = '编辑想法';
  document.getElementById('journal-modal-title-input').value = e.title || '';
  document.getElementById('journal-modal-content').value = e.content;
  document.getElementById('journal-modal-date').value = e.date;
  document.getElementById('journal-modal-content').classList.remove('border-red-400', 'ring-4', 'ring-red-100');
  renderMoodSelector();
  document.querySelectorAll('#journal-modal-papers .paper-option').forEach(o => {
    o.style.borderColor = '#EDE4DB';
    o.style.boxShadow = 'none';
  });
  const paperEl = document.querySelector(`#journal-modal-papers .paper-option[data-paper="${journalPaper}"]`);
  if (paperEl) { paperEl.style.borderColor = '#C86A4B'; paperEl.style.boxShadow = '0 0 0 3px rgba(200,106,75,0.12)'; }
  document.getElementById('journal-modal-overlay').classList.add('flex');
  document.getElementById('journal-modal-overlay').classList.remove('hidden');
}

function saveJournalEntry() {
  const contentEl = document.getElementById('journal-modal-content'),
    content = contentEl.value.trim();
  if (!content) {
    contentEl.classList.add('border-red-400', 'ring-4', 'ring-red-100');
    toast('请输入内容', 'warn');
    return;
  }
  contentEl.classList.remove('border-red-400', 'ring-4', 'ring-red-100');
  const title = document.getElementById('journal-modal-title-input').value.trim() || null,
    date = document.getElementById('journal-modal-date').value;
  if (journalEditId) {
    const e = journalEntries.find(x => x.id === journalEditId);
    if (!e) return;
    e.title = title; e.content = content; e.date = date;
    e.mood = journalMood; e.customMood = journalMood === 'custom' ? journalCustomMood.trim() : null;
    e.paper = journalPaper; e.updatedAt = Date.now();
    svJournal(journalEntries); toast('想法已更新', 'info');
  } else {
    journalEntries.push({
      id: Date.now(), title, content, date,
      mood: journalMood, customMood: journalMood === 'custom' ? journalCustomMood.trim() : null,
      paper: journalPaper,
      createdAt: Date.now(), updatedAt: Date.now()
    });
    svJournal(journalEntries); toast('📝 新想法已记录！', 'info');
  }
  closeJournalModal();
  renderJournal();
}

function delJournalEntry(id) {
  if (!confirm('确定删除这条想法吗？')) return;
  journalEntries = journalEntries.filter(e => e.id !== id);
  svJournal(journalEntries);
  renderJournal();
  toast('已删除', 'info');
}

/* ============================================================
   Render — Journal
   ============================================================ */
function renderJournal() {
  const list = document.getElementById('journal-list'),
    empty = document.getElementById('journal-empty');
  // Remove old cards (keep empty state)
  list.querySelectorAll('.journal-card').forEach(el => el.remove());

  if (!journalEntries.length) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    const sorted = [...journalEntries].sort((a, b) => b.createdAt - a.createdAt);
    sorted.forEach(e => {
      const mood = MOODS.find(m => m.key === e.mood);
      const isCustom = e.mood === 'custom';
      const moodDisplay = isCustom
        ? `<span class="text-sm text-gray-400 bg-white/60 px-3 py-1 rounded-full">${esc(e.customMood || '自定义')}</span>`
        : `<span class="text-sm text-gray-400 bg-white/60 px-3 py-1 rounded-full">${(mood || MOODS[0]).emoji} ${(mood || MOODS[0]).label}</span>`;
      const moodEmoji = isCustom ? '' : `<span class="text-lg">${(mood || MOODS[0]).emoji}</span>`;
      const card = document.createElement('div');
      card.className = `journal-card paper-${e.paper} rounded-2xl shadow-card p-5 flex flex-col gap-3 relative overflow-hidden hover:-translate-y-1 hover:shadow-card-hover transition-all duration-200 cursor-default`;
      card.style.minHeight = '180px';
      card.innerHTML = `
        <div class="flex items-start justify-between gap-2">
          <div class="text-xs text-gray-400 font-boba">${fmtDate(e.date)}</div>
          ${moodEmoji}
        </div>
        ${e.title ? `<div class="text-base font-bold text-gray-800 font-boba leading-snug">${esc(e.title)}</div>` : ''}
        <div class="flex-1 text-base text-gray-700 font-boba leading-relaxed whitespace-pre-wrap" style="font-size:18px;line-height:2">${esc(e.content)}</div>
        <div class="flex items-center justify-between pt-2 border-t border-gray-100">
          ${moodDisplay}
          <div class="flex gap-1.5">
            <button class="text-xs px-2.5 py-1 rounded-lg border border-gray-200 bg-white/60 text-gray-400 cursor-pointer font-boba hover:bg-white hover:text-gray-700 transition-all duration-200" onclick="event.stopPropagation();editJournalEntry(${e.id})">编辑</button>
            <button class="text-xs px-2.5 py-1 rounded-lg border border-gray-200 bg-white/60 text-gray-400 cursor-pointer font-boba hover:bg-red-50 hover:text-red-400 transition-all duration-200" onclick="event.stopPropagation();delJournalEntry(${e.id})">删除</button>
          </div>
        </div>`;
      list.appendChild(card);
    });
  }
}

/* ============================================================
   Init
   ============================================================ */
renderStars(0);
renderAll();
</script>
</body>
